name: Cross-Platform Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    
    env:
      PROJECT_NAME: SLC-Package-Converter  # Add your project name here

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
        
      - name: Build and publish for multiple platforms
        run: |
          # Create arrays of target platforms and their display names
          platforms=("linux-x64" "win-x64" "osx-x64")
          names=("linux" "windows" "macos")
          
          # Loop through platforms and build for each
          for i in "${!platforms[@]}"; do
            platform=${platforms[$i]}
            name=${names[$i]}
            
            echo "Building for $name ($platform)..."
            
            # Add file extension for Windows executables
            file_extension=""
            if [[ "$platform" == "win-x64" ]]; then
              file_extension=".exe"
            fi
            
            # Build and package with version info
            dotnet publish -c Release -r $platform \
              --self-contained true \
              -p:PublishSingleFile=true \
              -p:PublishTrimmed=true \
              -p:IncludeNativeLibrariesForSelfExtract=true \
              -p:Version=${{ env.VERSION }} \
              -o "publish/$name"
            
            # Create zip archive
            (cd "publish/$name" && zip -r "../../${{ env.PROJECT_NAME }}-${{ env.VERSION }}-$name.zip" *)
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.PROJECT_NAME }}-${{ env.VERSION }}-linux.zip
            ${{ env.PROJECT_NAME }}-${{ env.VERSION }}-windows.zip
            ${{ env.PROJECT_NAME }}-${{ env.VERSION }}-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Run tests
        run: dotnet test --no-restore --verbosity normal