name: Cross-Platform Build and Release

on:
  release:
    types: [published]
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-release:
    name: Build and Upload Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore SLC-Package-Converter/SLC-Package-Converter.csproj

      - name: Publish for Linux-x64
        run: dotnet publish SLC-Package-Converter/SLC-Package-Converter.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o publish/linux

      - name: Publish for Windows-x64
        run: dotnet publish SLC-Package-Converter/SLC-Package-Converter.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish/windows

      - name: Upload Linux binary as artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-binary
          path: publish/linux/*
          retention-days: 30

      - name: Upload Windows binary as artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-binary
          path: publish/windows/*
          retention-days: 30

      - name: Upload Linux binary to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: publish/linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows binary to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: publish/windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}