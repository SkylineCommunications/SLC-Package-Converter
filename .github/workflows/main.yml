name: Cross-Platform Build and Release

on:
  release:
    types: [published]

jobs:
  build-and-release:
    name: Build and Upload Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore SLC-Package-Converter/SLC-Package-Converter.csproj

      - name: Publish for Linux-x64
        run: dotnet publish SLC-Package-Converter/SLC-Package-Converter.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o publish/linux

      - name: Publish for Windows-x64
        run: dotnet publish SLC-Package-Converter/SLC-Package-Converter.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish/windows

      - name: Upload Linux binary
        uses: softprops/action-gh-release@v2
        with:
          files: publish/linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows binary
        uses: softprops/action-gh-release@v2
        with:
          files: publish/windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}